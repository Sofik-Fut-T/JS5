<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Hunt Game - Hard Mode</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background-color: white;
        }

        #info {
            padding: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        #target {
            width: 50px;
            height: 50px;
            background-color: red;
            position: absolute;
            cursor: pointer;
            /* Додаємо плавність для ефекту зменшення квадрата */
            transition: width 0.2s, height 0.2s; 
        }
    </style>
</head>
<body>

    <div id="info">
        <p id="scoreText">score: 0</p>
        <p id="timeText">time left for click: 3</p>
        <p id="levelText">level: 1</p> </div>

    <div id="target"></div>

    <script>
        const target = document.getElementById("target");
        const scoreText = document.getElementById("scoreText");
        const timeText = document.getElementById("timeText");
        const levelText = document.getElementById("levelText");

        // Змінні стану гри
        let score = 0;
        let currentLevelTime = 3; // Базовий час, який дається на поточному рівні
        let timeLeft = currentLevelTime; 
        let targetSize = 50; // Початковий розмір квадрата
        let timerId;

        function moveTarget() {
            const maxX = window.innerWidth - target.offsetWidth;
            const maxY = window.innerHeight - target.offsetHeight;

            const randomX = Math.floor(Math.random() * maxX);
            // Залишаємо відступ зверху, щоб квадрат не перекривав текст
            const randomY = Math.floor(Math.random() * (maxY - 140)) + 140;

            target.style.left = randomX + "px";
            target.style.top = randomY + "px";
        }

        function startTimer() {
            clearInterval(timerId);
            timerId = setInterval(function() {
                timeLeft--;
                timeText.textContent = "time left for click: " + timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    alert("Гра закінчена! Ваш рахунок: " + score);
                    resetGame();
                }
            }, 1000);
        }

        function resetGame() {
            // Скидаємо всі змінні до початкових значень
            score = 0;
            currentLevelTime = 3;
            timeLeft = currentLevelTime;
            targetSize = 50; 
            
            // Відновлюємо розмір квадрата
            target.style.width = targetSize + "px";
            target.style.height = targetSize + "px";
            
            // Оновлюємо текст
            scoreText.textContent = "score: " + score;
            timeText.textContent = "time left for click: " + timeLeft;
            levelText.textContent = "level: 1";
            
            moveTarget();
            clearInterval(timerId); 
        }

        target.addEventListener("click", function() {
            score++;
            
            // --- ЛОГІКА ПРОГРЕСИВНОЇ СКЛАДНОСТІ ---
            
            // 1. Зменшуємо розмір квадрата з кожним кліком (мінімум до 15px)
            if (targetSize > 15) {
                targetSize -= 2; 
                target.style.width = targetSize + "px";
                target.style.height = targetSize + "px";
            }

            // 2. Кожні 5 балів ускладнюємо гру, зменшуючи час на клік (мінімум до 1 секунди)
            if (score % 5 === 0 && currentLevelTime > 1) {
                currentLevelTime--;
            }
            
            // Вираховуємо рівень складності для відображення (1, 2, 3)
            let level = 4 - currentLevelTime; 
            levelText.textContent = "level: " + level;
            
    

            // Оновлюємо час таймера до нового ускладненого значення
            timeLeft = currentLevelTime; 
            scoreText.textContent = "score: " + score;
            timeText.textContent = "time left for click: " + timeLeft;

            moveTarget();
            startTimer();
        });

        resetGame();

    </script>
</body>
</html>
