<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Hunt Game</title>
    <style>
        /* Базові стилі, щоб прибрати відступи і заборонити прокрутку */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background-color: white;
        }

        /* Стилі для блоку з інформацією (рахунок і час) */
        #info {
            padding: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        /* Стилі для нашої цілі - червоного квадрата */
        #target {
            width: 50px;
            height: 50px;
            background-color: red;
            position: absolute; /* Дозволяє вільно рухати квадрат по екрану */
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="info">
        <p id="scoreText">score: 0</p>
        <p id="timeText">time left for click: 3</p>
    </div>

    <div id="target"></div>

    <script>
        // 1. Отримуємо доступ до елементів DOM
        const target = document.getElementById("target");
        const scoreText = document.getElementById("scoreText");
        const timeText = document.getElementById("timeText");

        // Змінні стану гри
        let score = 0;
        let timeLeft = 3; // Час на клік (в секундах)
        let timerId;

        // 2. Функція для переміщення квадрата у випадкове місце
        function moveTarget() {
            // Визначаємо максимальні координати X та Y, щоб квадрат не виходив за екран
            const maxX = window.innerWidth - target.offsetWidth;
            const maxY = window.innerHeight - target.offsetHeight;

            // Генеруємо випадкові координати
            // Додаємо 100 до Y, щоб квадрат не перекривав текст зверху
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * (maxY - 100)) + 100;

            // Застосовуємо координати
            target.style.left = randomX + "px";
            target.style.top = randomY + "px";
        }

        // 3. Функція для управління таймером
        function startTimer() {
            // Очищаємо попередній таймер, якщо він був
            clearInterval(timerId);
            
            // Запускаємо новий інтервал (виконується щосекунди)
            timerId = setInterval(function() {
                timeLeft--; // Зменшуємо час на 1
                timeText.textContent = "time left for click: " + timeLeft; // Оновлюємо текст

                // Якщо час вийшов
                if (timeLeft <= 0) {
                    clearInterval(timerId); // Зупиняємо таймер
                    alert("Гра закінчена! Ваш рахунок: " + score); // Виводимо результат
                    resetGame(); // Скидаємо гру
                }
            }, 1000); // 1000 мілісекунд = 1 секунда
        }

        // 4. Функція для скидання гри до початкового стану
        function resetGame() {
            score = 0;
            timeLeft = 3;
            scoreText.textContent = "score: " + score;
            timeText.textContent = "time left for click: " + timeLeft;
            moveTarget();
            // Таймер не запускаємо, поки гравець не клікне перший раз
            clearInterval(timerId); 
        }

        // 5. Обробник події кліку по червоному квадрату
        target.addEventListener("click", function() {
            score++; // Збільшуємо рахунок
            timeLeft = 3; // Оновлюємо час на клік

            // Оновлюємо текст на сторінці
            scoreText.textContent = "score: " + score;
            timeText.textContent = "time left for click: " + timeLeft;

            moveTarget(); // Рухаємо квадрат
            startTimer(); // Перезапускаємо таймер
        });

        // Ініціалізація гри при завантаженні сторінки
        resetGame();

    </script>
</body>
</html>
